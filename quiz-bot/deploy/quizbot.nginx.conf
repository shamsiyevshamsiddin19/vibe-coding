# /etc/nginx/conf.d/quizbot.conf
# Master (subtitr) panel /quiz proxy → shu server (79.76.38.131:80) → 127.0.0.1:8095
# X-Forwarded-Prefix va X-Admin-Proxy sarlavhalari master'dan keladi va upstream'ga
# o'zgarishsiz uzatiladi (nginx default: proxy_pass_request_headers on).
server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
